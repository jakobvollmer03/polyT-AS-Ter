name: config


tools: 
  ["Whippet"] # all tools to compare
exon_mode_tools: 
  ["Whippet"] # tools reporting events as exonic contigs



tool_output: 
  Whippet: "/path/to/tool_output.tsv" # path to tool output file containing events and their coordinates, which will be used for validation. Should be in the format of the output files generated by the pipeline (e.g. whippet_lsvs_w_event_types.tsv), but can be generated independently as long as it contains the necessary information (event type, coordinates, etc.). If spliceat_mode = false, make sure to adjust the expected format in the score_junctions section of the Snakefile accordingly.


pipeline_dir: "/path/to/validation_pipeline" #path to Validation Pipeline directory
experiment: "spliceat_validation" # name of experiment, used for naming output files and directories


isoseq_validation:
  isoseq_results_dir: "/path/to/isoseq_results" # specify where output of the pipeline should be stored
  isoseq_mode: true
  spliceat_mode: false
  spliceat_output_dir: # specify spliceat masterlist directory, from which polyT-AS-Ter will extract the tool output files automatically 
  organism: "Mus_musculus" # "Homo_sapiens" #
  ensembl: "Mus_musculus_GRCm39_115" #"Homo_sapiens_GRCh38_115" #
  isoseq_gtf: "/mnt/gtklab01/linglab/tdp43/isoseq/results/run2_includesBothBatches/KO_merged.collapsed.gff"
  control_isoseq_gtf: "/mnt/gtklab01/linglab/tdp43/isoseq/results/run2_includesBothBatches/CTR.collapsed.gff"
  keep_unclassifiable_events: FALSE
  tolerance: 2 # base pair tolerance to be applied when coordinate matching is performed